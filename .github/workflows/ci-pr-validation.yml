name: "CI - Validación de PR"                                                      
                                                                                             
on:
  push:                                                                            
    branches: [feature/*]
  pull_request:
    branches: [develop]
                                                                                    
jobs:                                                                                                                                      
  lint:
    uses: aws-ug-manizales/Skorify_DevOps/.github/workflows/shared--lint-frontend.yml@feature/ci-pr-validation-workflows

  sca:                                                           
    uses: aws-ug-manizales/Skorify_DevOps/.github/workflows/shared--sca-generic.yml@feature/ci-pr-validation-workflows
  
  build:
    needs: [lint, sca]
    uses: aws-ug-manizales/Skorify_DevOps/.github/workflows/shared--build-frontend.yml@feature/ci-pr-validation-workflows
